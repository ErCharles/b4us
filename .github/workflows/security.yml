name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC — catches newly-disclosed advisories.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Report production-dependency vulnerabilities. Soft-fail on purpose:
      # this surfaces findings without blocking unrelated work. Tighten to
      # `--audit-level=high` (drop `|| true`) once the baseline is clean.
      - name: npm audit (prod deps)
        run: npm audit --omit=dev || true

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Report only — don't fail the build (yet).
          exit-code: '0'
