services:
  backend:
    build: .
    container_name: bus-backend
    # Runs from the built image only — no source bind-mount, so production
    # is immutable and rollback == redeploying a previous image tag/digest.
    ports:
      - "3090:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - CRTM_BASE_URL=https://www.crtm.es/widgets/api
      - CACHE_FRESH_TTL=15
      - CACHE_STALE_TTL=120
      - CACHE_NEGATIVE_TTL=30
      # No literal default: deploy fails fast if the operator forgets it.
      # The old token is burned in git history — ROTATE it (see DEPLOY.md).
      - METRICS_TOKEN=${METRICS_TOKEN:?METRICS_TOKEN required}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ---------- Hardening ----------
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # /ready returns 503 when Redis/circuit-breaker are unhealthy, so the
      # container is only "healthy" when it can actually serve. (/health is
      # informational and always 200.)
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/ready', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    container_name: bus-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  # ---------- Observability stack ----------
  # Scrapes /metrics from the backend every 15s. Bind only on localhost
  # so this stays internal — expose via your reverse proxy if you need
  # remote access.
  prometheus:
    image: prom/prometheus:latest
    container_name: bus-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      # Bearer token for scraping the backend /metrics. Create this file with
      # the rotated token (NOT committed — gitignore it). See DEPLOY.md.
      - ./monitoring/metrics-token:/etc/prometheus/metrics-token:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana-oss:latest
    container_name: bus-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3091:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
